}

    </div>`;

        // Gelir/Gider Donut

        if (ctx1) {
            new Chart(ctx1, { type: 'doughnut', data: { labels: ['Gelir','Gider'], datasets: [{ data: [ti, te], backgroundColor: ['#4ade80','#f87171'], borderWidth: 0 }] }, options: { plugins: { legend: { labels: { color: '#fff' } } } } });

    function list() {
        document.getElementById('tx-list').innerHTML = transactions.slice().reverse().map(t => `
            <tr class="border-b border-white/5"><td>${t.type==='income'?'<span class="text-green-400">↑ Gelir</span>':'<span class="text-red-400">↓ Gider</span>'}</td><td>${t.category}</td><td class="font-semibold">${fmt(t.amount)}</td><td>${t.date}</td>

    list();
    
    document.getElementById('tx-form').addEventListener('submit', function(e) {
        e.preventDefault();

                    <input id="p-value" type="number" placeholder="Değer" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white">
                    <button type="submit" class="w-full bg-green-500 text-white py-2 rounded-lg btn">➕ Ekle</button>
                </form>
            </div>
            <div class="glass-card p-6"><h3 class="font-semibold mb-3">Varlıklar</h3><div class="space-y-2" id="port-list"></div></div>
        </div>
    </div>`;
    
    document.getElementById('port-list').innerHTML = portfolio.map((p,i) => `
        <div class="flex justify-between items-center bg-white/5 p-3 rounded-lg">
            <span><span style="color:${p.color}">●</span> ${p.name} - ${fmt(p.value)}</span>
            <button onclick="delPort(${p.id})" class="text-red-400"><i class="fas fa-trash"></i></button>
        </div>
    `).join('');
    
    document.getElementById('add-port').addEventListener('submit', function(e) {
        e.preventDefault();
        const colors = ['#4ade80','#fbbf24','#60a5fa','#f7931a','#a78bfa','#34d399','#f472b6','#94a3b8'];
        portfolio.push({ id: Date.now(), name: document.getElementById('p-name').value, type: document.getElementById('p-type').value, cost: +document.getElementById('p-cost').value, value: +document.getElementById('p-value').value, color: colors[Math.floor(Math.random()*colors.length)] });
        save(); renderPortfoy();
    });
    
    setTimeout(() => {
        const ctx = document.getElementById('portfoyChart')?.getContext('2d');
        if (ctx) new Chart(ctx, { type: 'doughnut', data: { labels: portfolio.map(p=>p.name), datasets: [{ data: portfolio.map(p=>p.value), backgroundColor: portfolio.map(p=>p.color), borderWidth: 0 }] }, options: { plugins: { legend: { labels: { color: '#fff' } } } } });
    }, 200);
}
window.delPort = function(id) { if(confirm('Sil?')){ portfolio = portfolio.filter(p=>p.id!==id); save(); renderPortfoy(); } };

window.delCont = function(id) { if(confirm('Sil?')){ contentLibrary = contentLibrary.filter(c=>c.id!==id); save(); renderKutuphane(); } };

// ==================== ADMIN ====================
function renderAdmin() {
    if (!currentUser || currentUser.role !== 'admin') {
        document.getElementById('page-admin').innerHTML = '<p class="text-center text-red-400 mt-20">⛔ Yetkisiz erişim!</p>';
        return;
    }
    const allUsers = S.get('users');
    document.getElementById('page-admin').innerHTML = `
    <h2 class="text-3xl font-bold gold-text mb-6">🛡️ Admin Panel</h2>
    <div class="glass-card p-6">
        <h3 class="font-semibold mb-4">Kullanıcılar (${allUsers.length})</h3>
        <table class="w-full text-sm"><thead><tr class="text-gray-400"><th>Ad</th><th>Email</th><th>Plan</th><th>Rol</th><th></th></tr></thead>
        <tbody>${allUsers.map(u => `<tr class="border-b border-white/5"><td class="py-2">${u.name}</td><td>${u.email}</td><td>
            <select onchange="chPlan('${u.email}',this.value)" class="bg-white/5 border border-white/10 rounded px-2 py-1 text-yellow-300 text-xs">
                <option value="free" ${u.plan==='free'?'selected':''}>Free</option><option value="pro" ${u.plan==='pro'?'selected':''}>Pro</option><option value="premium" ${u.plan==='premium'?'selected':''}>Premium</option><option value="vip-elite" ${u.plan==='vip-elite'?'selected':''}>Vip Elite</option>
            </select></td><td>${u.role}</td>
            <td><button onclick="delUser('${u.email}')" class="text-red-400"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody></table>
    </div>`;
}
window.chPlan = function(email, plan) {
    users = S.get('users');
    const u = users.find(u=>u.email===email);
    if(u) { u.plan = plan; S.set('users',users); if(currentUser.email===email){ currentUser.plan=plan; S.set('currentUser',currentUser); updateSidebar(); } }
};
window.delUser = function(email) {
    if(email==='admin@ffos.com') return alert('Admin silinemez!');
    if(confirm(email+' silinsin mi?')) {
        users = S.get('users').filter(u=>u.email!==email);
        S.set('users',users);
        renderAdmin();
    }
};

// ==================== DİĞER ====================
function renderHedefler() {
    const g = goals[0];
    const types = [
        { name:'Lean FIRE', icon:'🔥', expense:g.monthlyExpense*0.6, color:'green' },
        { name:'Regular FIRE', icon:'⭐', expense:g.monthlyExpense*0.8, color:'yellow' },
        { name:'Fat FIRE', icon:'💎', expense:g.monthlyExpense*1.2, color:'purple' },
        { name:'Coast FIRE', icon:'🏖️', expense:g.monthlyExpense, color:'blue' }
    ];
    document.getElementById('page-hedefler').innerHTML = `<h2 class="text-3xl font-bold gold-text mb-6">🎯 FIRE Hedefleri</h2><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">${types.map(t => { const fn=t.expense*12*25; const p=Math.min(100,(g.current/fn*100)).toFixed(1); return `<div class="glass-card p-5"><span class="text-2xl">${t.icon}</span><h3 class="font-bold text-${t.color}-400 mt-2">${t.name}</h3><div class="w-full bg-white/10 rounded-full h-2 my-2"><div class="bg-${t.color}-400 h-2 rounded-full" style="width:${p}%"></div></div><p class="text-sm">Hedef: ${fmt(fn)}</p><p class="text-xs text-gray-400">%${p}</p></div>`; }).join('')}</div>`;
}

function renderAbonelik() { document.getElementById('page-abonelik').innerHTML = `<h2 class="text-3xl font-bold gold-text mb-8 text-center">💎 Paketler</h2><div class="grid grid-cols-1 md:grid-cols-4 gap-6"><div class="glass-card p-6 text-center"><h3 class="text-xl font-bold">Free</h3><p class="text-2xl font-bold text-yellow-300 my-3">Ücretsiz</p><button onclick="upgrade('free')" class="w-full bg-yellow-500 text-white py-2 rounded-xl btn">Seç</button></div><div class="glass-card p-6 text-center ring-2 ring-yellow-400"><h3 class="text-xl font-bold">Pro</h3><p class="text-2xl font-bold text-yellow-300 my-3">₺149/ay</p><button onclick="upgrade('pro')" class="w-full bg-yellow-500 text-white py-2 rounded-xl btn">Yükselt</button></div><div class="glass-card p-6 text-center"><h3 class="text-xl font-bold">Premium</h3><p class="text-2xl font-bold text-yellow-300 my-3">₺249/ay</p><button onclick="upgrade('premium')" class="w-full bg-yellow-500 text-white py-2 rounded-xl btn">Yükselt</button></div><div class="glass-card p-6 text-center"><h3 class="text-xl font-bold">Vip Elite</h3><p class="text-2xl font-bold text-yellow-300 my-3">₺499/ay</p><button onclick="upgrade('vip-elite')" class="w-full bg-yellow-500 text-white py-2 rounded-xl btn">Yükselt</button></div></div>`; }
window.upgrade = function(plan) {
    if(!currentUser) return alert('Giriş yapın!');
    currentUser.plan = plan;
    S.set('currentUser',currentUser);
    users = S.get('users');
    const u = users.find(u=>u.email===currentUser.email);
    if(u) { u.plan=plan; S.set('users',users); }
    updateSidebar();
    alert('✅ Plan: '+plan);
};
function renderRapor() { document.getElementById('page-rapor').innerHTML = `<div class="max-w-2xl mx-auto glass-card p-8 text-center"><h2 class="text-2xl font-bold gold-text mb-4">📄 PDF Rapor</h2><button onclick="pdf()" class="bg-red-500 hover:bg-red-600 text-white px-8 py-4 rounded-xl font-bold btn"><i class="fas fa-download mr-2"></i>İndir</button></div>`; }
window.pdf = function() { try { const { jsPDF } = window.jspdf; const d = new jsPDF(); d.text('Finansal Danışmanlık Raporu',20,20); d.text('Tarih: '+new Date().toLocaleDateString('tr-TR'),20,30); d.save('rapor.pdf'); alert('✅ İndirildi!'); } catch(e) { alert('Hata!'); } };

// ==================== BOOT ====================
function boot() {
    updateSidebar();
    if (currentUser) {
        navigateTo('dashboard');
    } else {
        navigateTo('auth');
    }
}

// Global
window.navigateTo = navigateTo;
window.toggleSidebar = toggleSidebar;
window.logout = logout;

document.addEventListener('DOMContentLoaded', boot);
if (document.readyState !== 'loading') boot();
</script>
